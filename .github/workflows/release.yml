name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Run tests
      run: make test

    - name: Build binaries
      run: |
        # Create build directory
        mkdir -p dist
        
        # Get version for ldflags
        VERSION=${{ steps.version.outputs.VERSION }}
        LDFLAGS="-X github.com/yourorg/prtool/cmd.appVersion=${VERSION}"
        
        # Build for multiple platforms
        echo "Building prtool ${VERSION} for multiple platforms..."
        
        # macOS AMD64
        GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/prtool-darwin-amd64 .
        
        # macOS ARM64 (Apple Silicon)
        GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/prtool-darwin-arm64 .
        
        # Linux AMD64
        GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/prtool-linux-amd64 .
        
        # Linux ARM64
        GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/prtool-linux-arm64 .
        
        # Windows AMD64
        GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/prtool-windows-amd64.exe .
        
        # Create checksums
        cd dist
        sha256sum * > checksums.txt
        cd ..

    - name: Create tarballs
      run: |
        cd dist
        
        # Create tarballs for Unix systems
        tar czf prtool-darwin-amd64.tar.gz prtool-darwin-amd64
        tar czf prtool-darwin-arm64.tar.gz prtool-darwin-arm64
        tar czf prtool-linux-amd64.tar.gz prtool-linux-amd64
        tar czf prtool-linux-arm64.tar.gz prtool-linux-arm64
        
        # Create zip for Windows
        zip prtool-windows-amd64.zip prtool-windows-amd64.exe
        
        # Update checksums to include archives
        sha256sum *.tar.gz *.zip >> checksums.txt
        
        cd ..

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.version.outputs.VERSION }}
        body: |
          ## prtool ${{ steps.version.outputs.VERSION }}
          
          ### Installation
          
          #### macOS (Intel)
          ```bash
          curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/prtool-darwin-amd64.tar.gz | tar xz
          chmod +x prtool-darwin-amd64
          sudo mv prtool-darwin-amd64 /usr/local/bin/prtool
          ```
          
          #### macOS (Apple Silicon)
          ```bash
          curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/prtool-darwin-arm64.tar.gz | tar xz
          chmod +x prtool-darwin-arm64
          sudo mv prtool-darwin-arm64 /usr/local/bin/prtool
          ```
          
          #### Linux (AMD64)
          ```bash
          curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/prtool-linux-amd64.tar.gz | tar xz
          chmod +x prtool-linux-amd64
          sudo mv prtool-linux-amd64 /usr/local/bin/prtool
          ```
          
          #### Linux (ARM64)
          ```bash
          curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/prtool-linux-arm64.tar.gz | tar xz
          chmod +x prtool-linux-arm64
          sudo mv prtool-linux-arm64 /usr/local/bin/prtool
          ```
          
          #### Windows
          Download and extract [prtool-windows-amd64.zip](https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/prtool-windows-amd64.zip)
          
          ### Checksums
          See checksums.txt for SHA256 hashes of all release files.
        draft: false
        prerelease: false

    - name: Upload Release Assets
      run: |
        # Get upload URL
        UPLOAD_URL="${{ steps.create_release.outputs.upload_url }}"
        
        # Upload tarballs
        for file in dist/*.tar.gz; do
          echo "Uploading $file..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @"$file" \
            "${UPLOAD_URL}?name=$(basename $file)"
        done
        
        # Upload zip
        for file in dist/*.zip; do
          echo "Uploading $file..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/zip" \
            --data-binary @"$file" \
            "${UPLOAD_URL}?name=$(basename $file)"
        done
        
        # Upload checksums
        echo "Uploading checksums.txt..."
        curl -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: text/plain" \
          --data-binary @"dist/checksums.txt" \
          "${UPLOAD_URL}?name=checksums.txt"

  # Build and test on multiple OS to ensure compatibility
  test-multi-os:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.23']
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}
    
    - name: Get version from tag
      id: version
      shell: bash
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Test with version
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        LDFLAGS="-X github.com/yourorg/prtool/cmd.appVersion=${VERSION}"
        go test -ldflags "${LDFLAGS}" ./...
    
    - name: Build with version
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        LDFLAGS="-X github.com/yourorg/prtool/cmd.appVersion=${VERSION}"
        go build -ldflags "${LDFLAGS}" -o prtool${{ matrix.os == 'windows-latest' && '.exe' || '' }} .
    
    - name: Verify version
      shell: bash
      run: |
        VERSION=${{ steps.version.outputs.VERSION }}
        OUTPUT=$(./prtool${{ matrix.os == 'windows-latest' && '.exe' || '' }} --version 2>&1)
        echo "Version output: $OUTPUT"
        if [[ "$OUTPUT" != *"$VERSION"* ]]; then
          echo "ERROR: Version mismatch. Expected $VERSION in output."
          exit 1
        fi